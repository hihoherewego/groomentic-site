<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Groomentic - Morning Briefing</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #f5e6d3 0%, #e8d4c0 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .container {
            background: white;
            border-radius: 20px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.1);
            padding: 60px 40px;
            text-align: center;
            max-width: 600px;
        }

        .logo {
            font-size: 48px;
            margin-bottom: 20px;
        }

        h1 {
            color: #c68a6f;
            margin-bottom: 15px;
            font-size: 32px;
        }

        p {
            color: #666;
            margin-bottom: 40px;
            font-size: 16px;
        }

        .team-buttons {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }

        .team-btn {
            background: linear-gradient(135deg, #d4a574 0%, #c68a6f 100%);
            color: white;
            border: none;
            padding: 18px 30px;
            border-radius: 12px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            text-decoration: none;
            display: inline-block;
            transition: transform 0.2s, box-shadow 0.2s;
            box-shadow: 0 4px 15px rgba(198, 138, 111, 0.3);
        }

        .team-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(198, 138, 111, 0.4);
        }

        .team-btn:active {
            transform: translateY(0);
        }

        .footer {
            color: #999;
            font-size: 13px;
            margin-top: 30px;
        }

        @media (max-width: 600px) {
            .container {
                padding: 40px 25px;
            }

            h1 {
                font-size: 24px;
            }

            .team-buttons {
                grid-template-columns: 1fr;
                gap: 15px;
            }

            .team-btn {
                padding: 15px 25px;
                font-size: 15px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="logo">🐱</div>
        <h1>Purrf Cat Grooming</h1>
        <p>Morning Briefing</p>

        <div class="team-buttons">
            <a href="/morning/paul/index.html" class="team-btn">Paul</a>
            <a href="/morning/erin/index.html" class="team-btn">Erin</a>
            <a href="/morning/lauren/index.html" class="team-btn">Lauren</a>
        </div>

        <div class="footer">
            <p>Select your name to view your personalized morning briefing</p>
        </div>
    </div>
</body>
</html>
