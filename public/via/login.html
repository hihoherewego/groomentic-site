<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta name="robots" content="noindex, nofollow, noarchive">
<title>Via access · Pawfentic</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<script src="https://cdn.tailwindcss.com"></script>
<style>
  body { font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif; }
  .mono { font-family: 'JetBrains Mono', monospace; }
</style>
</head>
<body class="bg-stone-50 min-h-screen flex items-center justify-center px-6">
  <form action="/api/via-login" method="POST" class="bg-white p-8 rounded-xl border border-stone-200 max-w-sm w-full shadow-sm">
    <p class="mono text-xs text-stone-400 uppercase tracking-wider mb-1">Private preview</p>
    <h1 class="text-xl font-bold text-stone-900 mb-2">Via access</h1>
    <p class="text-sm text-stone-600 mb-6">Enter the shared password.</p>
    <input type="hidden" name="next" id="next-input" value="/via" />
    <input
      type="password"
      name="password"
      required
      autofocus
      placeholder="Password"
      class="w-full px-3 py-2.5 border border-stone-300 rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-stone-900 focus:border-transparent"
    />
    <p id="error-msg" class="text-sm text-rose-600 mt-2 hidden">Incorrect password.</p>
    <button type="submit" class="w-full mt-4 bg-stone-900 hover:bg-stone-800 text-white font-medium py-2.5 rounded-lg transition-colors">
      Enter
    </button>
  </form>
  <script>
    (function() {
      const params = new URLSearchParams(window.location.search);
      const next = params.get('next');
      if (next) document.getElementById('next-input').value = next;
      if (params.get('error')) document.getElementById('error-msg').classList.remove('hidden');
    })();
  </script>
</body>
</html>
