<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lauren's Morning Briefing — Purrf Cat Grooming</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap');
        *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            background: #0a0a1a; color: #e0e0f0;
            min-height: 100vh; overflow-x: hidden; line-height: 1.6;
        }
        .orb { position: fixed; border-radius: 50%; filter: blur(80px); opacity: 0.4; animation: float 20s ease-in-out infinite; pointer-events: none; z-index: 0; }
        .orb-1 { width: 500px; height: 500px; background: radial-gradient(circle, #6366f1, transparent); top: -10%; left: -10%; }
        .orb-2 { width: 400px; height: 400px; background: radial-gradient(circle, #a855f7, transparent); top: 40%; right: -8%; animation-delay: -7s; }
        .orb-3 { width: 350px; height: 350px; background: radial-gradient(circle, #ec4899, transparent); bottom: -5%; left: 20%; animation-delay: -14s; }
        @keyframes float {
            0%, 100% { transform: translate(0, 0) scale(1); }
            33% { transform: translate(30px, -40px) scale(1.05); }
            66% { transform: translate(-20px, 20px) scale(0.95); }
        }
        .container { position: relative; z-index: 1; max-width: 720px; margin: 0 auto; padding: 24px 16px 60px; }
        .glass { background: rgba(255,255,255,0.06); backdrop-filter: blur(16px); -webkit-backdrop-filter: blur(16px); border: 1px solid rgba(255,255,255,0.1); border-radius: 16px; padding: 24px; margin-bottom: 20px; transition: transform 0.2s ease, box-shadow 0.2s ease; }
        .glass:hover { transform: translateY(-2px); box-shadow: 0 8px 32px rgba(99,102,241,0.15); }
        .header { text-align: center; padding: 40px 0 20px; }
        .header .logo { font-size: 2.2rem; margin-bottom: 4px; }
        .header h1 { font-size: 1.6rem; font-weight: 600; background: linear-gradient(135deg, #c084fc, #818cf8, #67e8f9); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; }
        .header .date { font-size: 0.95rem; color: rgba(255,255,255,0.5); margin-top: 6px; }
        .section-icon { font-size: 1.3rem; margin-right: 8px; vertical-align: middle; }
        .section-title { font-size: 1.1rem; font-weight: 600; margin-bottom: 14px; display: flex; align-items: center; }
        .tip-card { border-left: 3px solid #a78bfa; }
        .tip-label { font-size: 0.75rem; text-transform: uppercase; letter-spacing: 1.5px; color: #a78bfa; margin-bottom: 8px; font-weight: 600; }
        .tip-text { font-size: 0.95rem; color: rgba(255,255,255,0.85); }
        .news-item { padding: 10px 0; border-bottom: 1px solid rgba(255,255,255,0.06); }
        .news-item:last-child { border-bottom: none; }
        .news-item a { color: #93c5fd; text-decoration: none; font-size: 0.93rem; line-height: 1.5; display: block; transition: color 0.2s; }
        .news-item a:hover { color: #bfdbfe; text-decoration: underline; }
        .news-source { font-size: 0.75rem; color: rgba(255,255,255,0.35); margin-top: 2px; }
        .news-category { display: inline-block; font-size: 0.72rem; padding: 3px 10px; border-radius: 20px; margin-bottom: 6px; margin-right: 0; font-weight: 500; }
        .news-category-iran { background: rgba(248,113,113,0.2); color: #fca5a5; }
        .news-category-perth { background: rgba(45,212,191,0.2); color: #5eead4; }
        .news-category-ai { background: rgba(167,139,250,0.2); color: #c4b5fd; }
        .news-category-good { background: rgba(74,222,128,0.2); color: #86efac; }
        .client-card { background: rgba(255,255,255,0.04); border-radius: 12px; padding: 16px; margin-bottom: 12px; border: 1px solid rgba(255,255,255,0.06); }
        .client-card:last-child { margin-bottom: 0; }
        .client-time { font-size: 0.8rem; color: #a78bfa; font-weight: 600; text-transform: uppercase; letter-spacing: 0.5px; }
        .client-name { font-size: 1.05rem; font-weight: 600; margin: 4px 0; color: #f0f0ff; }
        .client-pet { font-size: 0.9rem; color: rgba(255,255,255,0.65); }
        .client-service { display: inline-block; background: rgba(99,102,241,0.2); color: #c4b5fd; font-size: 0.78rem; padding: 3px 10px; border-radius: 20px; margin-top: 6px; }
        .client-tags { margin-top: 6px; display: flex; flex-wrap: wrap; gap: 4px; }
        .client-tag { font-size: 0.72rem; padding: 2px 8px; border-radius: 10px; background: rgba(236,72,153,0.15); color: #f9a8d4; }
        .client-tag.new-client { background: rgba(52,211,153,0.2); color: #6ee7b7; }
        .client-notes { font-size: 0.82rem; color: rgba(255,255,255,0.5); margin-top: 6px; font-style: italic; }
        .visit-count { font-size: 0.75rem; color: rgba(255,255,255,0.4); margin-top: 4px; }
        .revenue-summary { text-align: center; padding: 14px; background: rgba(52,211,153,0.08); border-radius: 12px; margin-top: 16px; }
        .revenue-amount { font-size: 1.5rem; font-weight: 700; color: #6ee7b7; }
        .revenue-label { font-size: 0.8rem; color: rgba(255,255,255,0.45); margin-top: 2px; }
        .no-appointments { text-align: center; padding: 30px; color: rgba(255,255,255,0.4); font-style: italic; }
        .feedback-item { background: rgba(255,255,255,0.03); border-radius: 12px; padding: 14px; border: 1px solid rgba(255,255,255,0.06); }
        .feedback-item-label { font-size: 0.8rem; color: rgba(255,255,255,0.5); text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 10px; font-weight: 600; display: block; }
        .toggle-row { display: flex; gap: 8px; margin-bottom: 12px; }
        .toggle-btn { flex: 1; padding: 10px 12px; background: rgba(255,255,255,0.04); border: 1px solid rgba(255,255,255,0.1); border-radius: 10px; color: rgba(255,255,255,0.6); font-size: 0.85rem; font-weight: 500; cursor: pointer; transition: all 0.2s; }
        .toggle-btn:hover { border-color: rgba(255,255,255,0.25); }
        .toggle-btn.active { background: rgba(99,102,241,0.25); border-color: rgba(99,102,241,0.5); color: #c4b5fd; }
        .feedback-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 16px; }
        textarea.glass-input { width: 100%; padding: 12px 14px; background: rgba(255,255,255,0.06); border: 1px solid rgba(255,255,255,0.1); border-radius: 10px; color: #e0e0f0; font-size: 0.9rem; font-family: inherit; resize: vertical; min-height: 70px; margin-bottom: 12px; }
        textarea.glass-input::placeholder { color: rgba(255,255,255,0.3); }
        textarea.glass-input:focus { outline: none; border-color: rgba(167,139,250,0.5); box-shadow: 0 0 0 3px rgba(167,139,250,0.1); }
        .tag-grid { display: flex; flex-wrap: wrap; gap: 8px; margin: 12px 0; }
        .tag-btn { padding: 6px 14px; border-radius: 20px; font-size: 0.82rem; cursor: pointer; border: 1px solid rgba(255,255,255,0.12); background: rgba(255,255,255,0.04); color: rgba(255,255,255,0.6); transition: all 0.2s; }
        .tag-btn.active { background: rgba(99,102,241,0.25); border-color: rgba(99,102,241,0.5); color: #c4b5fd; }
        .tag-btn:hover { border-color: rgba(255,255,255,0.25); }
        .submit-btn { display: block; width: 100%; padding: 14px; border: none; border-radius: 12px; font-size: 1rem; font-weight: 600; cursor: pointer; background: linear-gradient(135deg, #6366f1, #a855f7); color: white; transition: all 0.3s; margin-top: 8px; }
        .submit-btn:hover { transform: translateY(-1px); box-shadow: 0 6px 20px rgba(99,102,241,0.4); }
        .submit-btn:active { transform: translateY(0); }
        .submit-btn:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }
        .feedback-msg { text-align: center; padding: 12px; border-radius: 10px; margin-top: 12px; font-size: 0.9rem; display: none; }
        .feedback-msg.success { display: block; background: rgba(52,211,153,0.12); color: #6ee7b7; }
        .feedback-msg.error { display: block; background: rgba(239,68,68,0.12); color: #fca5a5; }
        .links-grid { display: grid; gap: 8px; }
        .link-item a { color: #93c5fd; text-decoration: none; font-size: 0.88rem; transition: color 0.2s; }
        .link-item a:hover { color: #bfdbfe; text-decoration: underline; }
        .footer { text-align: center; padding: 30px 0; font-size: 0.78rem; color: rgba(255,255,255,0.25); }
        .footer a { color: rgba(255,255,255,0.35); text-decoration: none; }
        .footer a:hover { color: rgba(255,255,255,0.5); }
        .loading { text-align: center; padding: 60px 20px; }
        .spinner { width: 36px; height: 36px; border: 3px solid rgba(255,255,255,0.1); border-top-color: #a78bfa; border-radius: 50%; animation: spin 0.8s linear infinite; margin: 0 auto 16px; }
        @keyframes spin { to { transform: rotate(360deg); } }
        .loading-text { color: rgba(255,255,255,0.4); font-size: 0.9rem; }
        .error-state { text-align: center; padding: 40px 20px; color: rgba(255,255,255,0.5); }
        .error-state .icon { font-size: 2rem; margin-bottom: 12px; }
        @media (max-width: 500px) {
            .container { padding: 16px 10px 40px; }
            .glass { padding: 18px 16px; }
            .header h1 { font-size: 1.3rem; }
            .feedback-grid { grid-template-columns: 1fr; }
            .toggle-row { flex-direction: column; }
            .toggle-btn { width: 100%; }
        }
    </style>
</head>
<body data-user="lauren">
    <div class="orb orb-1"></div>
    <div class="orb orb-2"></div>
    <div class="orb orb-3"></div>
    <div class="container">
        <div class="header">
            <div class="logo">🐱</div>
            <h1>Good Morning, Lauren</h1>
            <div class="date" id="headerDate">Loading...</div>
        </div>
        <div id="content">
            <div class="loading">
                <div class="spinner"></div>
                <div class="loading-text">Fetching your briefing...</div>
            </div>
        </div>
    </div>
    <script>
    (function() {
        var USER = document.body.getAttribute('data-user') || 'lauren';
        var API = 'https://duwwfbohvptdsgrvlskj.supabase.co/functions/v1/serve-morning-briefing';
        var feedbackState = {
            useful: '',
            bestSections: [],
            changeRequest: '',
            addRemove: '',
            readingExperience: '',
            contentAmount: '',
            looks: '',
            improvement: '',
            generalComments: ''
        };

        function init() {
            fetch(API + '?name=' + USER + '&format=json')
                .then(function(res) { if (!res.ok) throw new Error('HTTP ' + res.status); return res.json(); })
                .then(function(row) {
                    if (!row || (!row.data && !row.json_data && !row.html_content)) { showError('No briefing available yet today. Check back after 5:00 AM.'); return; }
                    var data = row.data || row.json_data;
                    if (!data) { showError('Briefing data is still in legacy format. A new briefing will be generated tomorrow.'); return; }
                    render(data, row.briefing_date);
                })
                .catch(function(err) { console.error(err); showError('Could not load briefing. Please try refreshing.'); });
        }

        function showError(msg) {
            document.getElementById('content').innerHTML = '<div class="glass error-state"><div class="icon">&#128575;</div><p>' + msg + '</p></div>';
        }

        function formatBriefingDate(dateStr) {
            var d = new Date(dateStr + 'T00:00:00');
            return d.toLocaleDateString('en-AU', { weekday: 'long', day: 'numeric', month: 'long', year: 'numeric' });
        }

        function escHtml(s) { if (!s) return ''; return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
        function escAttr(s) { if (!s) return ''; return String(s).replace(/&/g,'&amp;').replace(/"/g,'&quot;').replace(/'/g,'&#39;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

        function getCategoryClass(label) {
            if (!label) return '';
            var lower = label.toLowerCase();
            if (lower.includes('iran') || lower.includes('war')) return 'news-category-iran';
            if (lower.includes('perth') || lower.includes('local')) return 'news-category-perth';
            if (lower.includes('claude') || lower.includes('ai')) return 'news-category-ai';
            if (lower.includes('good')) return 'news-category-good';
            return 'news-category-ai';
        }

        function render(data, briefingDate) {
            document.getElementById('headerDate').textContent = data.displayDate || formatBriefingDate(briefingDate);
            var clients = data.clients || [];
            var news = data.news || [];
            var f1 = data.f1 || [];
            var tip = data.tip || null;
            var totalCents = data.totalRevenueCents || 0;
            var appointmentCount = data.appointmentCount || clients.length;

            var html = '';

            // Claude Tip
            if (tip) {
                var tipText = '';
                if (typeof tip === 'string') { tipText = escHtml(tip); }
                else if (tip.title && tip.body) { tipText = '<strong>' + escHtml(tip.title) + '</strong> &#8212; ' + escHtml(tip.body); }
                else if (tip.body) { tipText = escHtml(tip.body); }
                html += '<div class="glass tip-card"><div class="tip-label">Claude Tip of the Day</div><div class="tip-text">' + tipText + '</div></div>';
            }

            // Curated News
            if (news.length) {
                html += '<div class="glass"><div class="section-title"><span class="section-icon">&#127462;&#127482;</span> Curated News</div>';
                news.forEach(function(n) {
                    var hasLabel = n.label && n.emoji;
                    if (hasLabel) {
                        html += '<div class="news-item">';
                        html += '<span class="news-category ' + getCategoryClass(n.label) + '">' + escHtml(n.emoji) + ' ' + escHtml(n.label) + '</span>';
                        html += '<a href="' + escAttr(n.link) + '" target="_blank" rel="noopener">' + escHtml(n.title) + '</a>';
                        if (n.source) html += '<div class="news-source">' + escHtml(n.source) + '</div>';
                        html += '</div>';
                    } else {
                        html += '<div class="news-item"><a href="' + escAttr(n.link) + '" target="_blank" rel="noopener">' + escHtml(n.title) + '</a>';
                        if (n.source) html += '<div class="news-source">' + escHtml(n.source) + '</div>';
                        html += '</div>';
                    }
                });
                html += '</div>';
            }

            // F1 News
            if (f1.length) {
                html += '<div class="glass"><div class="section-title"><span class="section-icon">&#127950;&#65039;</span> Formula 1</div>';
                f1.forEach(function(n) {
                    html += '<div class="news-item"><a href="' + escAttr(n.link) + '" target="_blank" rel="noopener">' + escHtml(n.title) + '</a>';
                    if (n.source) html += '<div class="news-source">' + escHtml(n.source) + '</div>';
                    html += '</div>';
                });
                html += '</div>';
            }

            // Schedule
            html += '<div class="glass"><div class="section-title"><span class="section-icon">&#128203;</span> Today\'s Schedule</div>';
            if (clients.length === 0) {
                html += '<div class="no-appointments">No appointments scheduled for today.</div>';
            } else {
                clients.forEach(function(c) {
                    html += '<div class="client-card">';
                    html += '<div class="client-time">' + escHtml(c.time || '') + (c.duration ? ' &#183; ' + c.duration + ' min' : '') + '</div>';
                    html += '<div class="client-name">' + escHtml(c.name || 'Unknown Client') + '</div>';
                    (c.pets || []).forEach(function(p) {
                        var petInfo = [p.name, p.breed, p.sex].filter(Boolean).join(' &#183; ');
                        if (petInfo) html += '<div class="client-pet">&#128062; ' + escHtml(petInfo) + '</div>';
                    });
                    html += '<div class="client-tags">';
                    (c.services || []).forEach(function(s) {
                        html += '<span class="client-service">' + escHtml(s.name) + '</span>';
                    });
                    if (c.is_new) html += '<span class="client-tag new-client">New Client</span>';
                    html += '</div>';
                    var totalVisits = 0;
                    (c.pets || []).forEach(function(p) { totalVisits += (p.visit_count || 0); });
                    if (totalVisits > 0) html += '<div class="visit-count">' + totalVisits + ' previous visit' + (totalVisits !== 1 ? 's' : '') + '</div>';
                    if (c.notes) html += '<div class="client-notes">"' + escHtml(c.notes) + '"</div>';
                    html += '</div>';
                });
                html += '<div class="revenue-summary"><div class="revenue-amount">$' + (totalCents / 100).toFixed(2) + '</div>';
                html += '<div class="revenue-label">' + appointmentCount + ' appointment' + (appointmentCount !== 1 ? 's' : '') + ' &#183; Estimated Revenue</div></div>';
            }
            html += '</div>';

            // Feedback - Panel 1: How was today's briefing?
            html += '<div class="glass feedback-section"><div class="section-title"><span class="section-icon">&#128203;</span> How was today\'s briefing?</div>';
            html += '<div class="feedback-item"><label class="feedback-item-label">Was this useful today?</label>';
            html += '<div class="toggle-row">';
            html += '<button type="button" class="toggle-btn choose-useful" data-value="yes">Yes</button>';
            html += '<button type="button" class="toggle-btn choose-useful" data-value="somewhat">Somewhat</button>';
            html += '<button type="button" class="toggle-btn choose-useful" data-value="no">No</button>';
            html += '</div></div>';
            html += '<div class="feedback-item"><label class="feedback-item-label">Best section today?</label>';
            html += '<div class="tag-grid" id="bestSectionsGrid">';
            html += '<button type="button" class="tag-btn choose-section" data-value="Tip">Tip</button>';
            html += '<button type="button" class="tag-btn choose-section" data-value="News">News</button>';
            html += '<button type="button" class="tag-btn choose-section" data-value="F1">F1</button>';
            html += '<button type="button" class="tag-btn choose-section" data-value="Schedule">Schedule</button>';
            html += '<button type="button" class="tag-btn choose-section" data-value="Revenue">Revenue</button>';
            html += '</div></div>';
            html += '<div class="feedback-item"><label class="feedback-item-label">What would you change?</label>';
            html += '<textarea class="glass-input" id="fbChange" placeholder="Your suggestions..."></textarea></div>';
            html += '<div class="feedback-item"><label class="feedback-item-label">Anything to add or remove?</label>';
            html += '<textarea class="glass-input" id="fbAddRemove" placeholder="Content feedback..."></textarea></div>';
            html += '</div>';

            // Feedback - Panel 2: Design & experience
            html += '<div class="glass feedback-section"><div class="section-title"><span class="section-icon">&#128394;</span> Design & experience</div>';
            html += '<div class="feedback-item"><label class="feedback-item-label">Reading experience?</label>';
            html += '<div class="toggle-row">';
            html += '<button type="button" class="toggle-btn choose-reading" data-value="easy">Easy</button>';
            html += '<button type="button" class="toggle-btn choose-reading" data-value="fine">Fine</button>';
            html += '<button type="button" class="toggle-btn choose-reading" data-value="hard">Hard to read</button>';
            html += '</div></div>';
            html += '<div class="feedback-item"><label class="feedback-item-label">Content amount?</label>';
            html += '<div class="toggle-row">';
            html += '<button type="button" class="toggle-btn choose-content" data-value="too_little">Too little</button>';
            html += '<button type="button" class="toggle-btn choose-content" data-value="just_right">Just right</button>';
            html += '<button type="button" class="toggle-btn choose-content" data-value="too_much">Too much</button>';
            html += '</div></div>';
            html += '<div class="feedback-item"><label class="feedback-item-label">How does it look?</label>';
            html += '<div class="toggle-row">';
            html += '<button type="button" class="toggle-btn choose-looks" data-value="love_it">Love it</button>';
            html += '<button type="button" class="toggle-btn choose-looks" data-value="its_fine">It\'s fine</button>';
            html += '<button type="button" class="toggle-btn choose-looks" data-value="needs_work">Needs work</button>';
            html += '</div></div>';
            html += '<div class="feedback-item"><label class="feedback-item-label">What would make this better?</label>';
            html += '<textarea class="glass-input" id="fbImprovement" placeholder="Design suggestions..."></textarea></div>';
            html += '<div class="feedback-item"><label class="feedback-item-label">General comments</label>';
            html += '<textarea class="glass-input" id="fbGeneral" placeholder="Any other thoughts..."></textarea></div>';
            html += '</div>';

            // Submit
            html += '<button class="submit-btn" id="submitBtn">Submit Feedback</button>';
            html += '<div class="feedback-msg" id="fbMsg"></div>';

            // Read More Links
            var allLinks = news.concat(f1).filter(function(n) { return n.link; });
            if (allLinks.length) {
                html += '<div class="glass" style="margin-top:20px;"><div class="section-title"><span class="section-icon">&#128279;</span> Read More</div><div class="links-grid">';
                allLinks.forEach(function(n) {
                    html += '<div class="link-item"><a href="' + escAttr(n.link) + '" target="_blank" rel="noopener">' + escHtml(n.title) + '</a></div>';
                });
                html += '</div></div>';
            }

            // Footer
            html += '<div class="footer"><p>Purrf Cat Grooming &#183; Morning Briefing</p><p style="margin-top:4px;"><a href="/">groomentic.com.au</a></p></div>';

            document.getElementById('content').innerHTML = html;
            bindFeedback(briefingDate);
        }

        function bindFeedback(briefingDate) {
            // Useful toggle
            document.querySelectorAll('.choose-useful').forEach(function(btn) {
                btn.addEventListener('click', function() {
                    var val = btn.dataset.value;
                    feedbackState.useful = feedbackState.useful === val ? '' : val;
                    document.querySelectorAll('.choose-useful').forEach(function(b) {
                        b.classList.toggle('active', b.dataset.value === feedbackState.useful);
                    });
                });
            });

            // Best sections multi-select
            document.querySelectorAll('.choose-section').forEach(function(btn) {
                btn.addEventListener('click', function() {
                    var val = btn.dataset.value;
                    if (feedbackState.bestSections.indexOf(val) >= 0) {
                        feedbackState.bestSections = feedbackState.bestSections.filter(function(s) { return s !== val; });
                    } else {
                        feedbackState.bestSections.push(val);
                    }
                    document.querySelectorAll('.choose-section').forEach(function(b) {
                        b.classList.toggle('active', feedbackState.bestSections.indexOf(b.dataset.value) >= 0);
                    });
                });
            });

            // Change request
            var fbChange = document.getElementById('fbChange');
            if (fbChange) fbChange.addEventListener('input', function() { feedbackState.changeRequest = fbChange.value; });

            // Add/remove
            var fbAddRemove = document.getElementById('fbAddRemove');
            if (fbAddRemove) fbAddRemove.addEventListener('input', function() { feedbackState.addRemove = fbAddRemove.value; });

            // Reading experience
            document.querySelectorAll('.choose-reading').forEach(function(btn) {
                btn.addEventListener('click', function() {
                    var val = btn.dataset.value;
                    feedbackState.readingExperience = feedbackState.readingExperience === val ? '' : val;
                    document.querySelectorAll('.choose-reading').forEach(function(b) {
                        b.classList.toggle('active', b.dataset.value === feedbackState.readingExperience);
                    });
                });
            });

            // Content amount
            document.querySelectorAll('.choose-content').forEach(function(btn) {
                btn.addEventListener('click', function() {
                    var val = btn.dataset.value;
                    feedbackState.contentAmount = feedbackState.contentAmount === val ? '' : val;
                    document.querySelectorAll('.choose-content').forEach(function(b) {
                        b.classList.toggle('active', b.dataset.value === feedbackState.contentAmount);
                    });
                });
            });

            // Looks
            document.querySelectorAll('.choose-looks').forEach(function(btn) {
                btn.addEventListener('click', function() {
                    var val = btn.dataset.value;
                    feedbackState.looks = feedbackState.looks === val ? '' : val;
                    document.querySelectorAll('.choose-looks').forEach(function(b) {
                        b.classList.toggle('active', b.dataset.value === feedbackState.looks);
                    });
                });
            });

            // Improvement
            var fbImprovement = document.getElementById('fbImprovement');
            if (fbImprovement) fbImprovement.addEventListener('input', function() { feedbackState.improvement = fbImprovement.value; });

            // General comments
            var fbGeneral = document.getElementById('fbGeneral');
            if (fbGeneral) fbGeneral.addEventListener('input', function() { feedbackState.generalComments = fbGeneral.value; });

            // Submit
            var submitBtn = document.getElementById('submitBtn');
            if (submitBtn) {
                submitBtn.addEventListener('click', function() {
                    var msg = document.getElementById('fbMsg');
                    var hasContent = feedbackState.useful || feedbackState.bestSections.length || (feedbackState.changeRequest && feedbackState.changeRequest.trim()) || (feedbackState.addRemove && feedbackState.addRemove.trim()) || feedbackState.readingExperience || feedbackState.contentAmount || feedbackState.looks || (feedbackState.improvement && feedbackState.improvement.trim()) || (feedbackState.generalComments && feedbackState.generalComments.trim());
                    if (!hasContent) { msg.className = 'feedback-msg error'; msg.textContent = 'Please provide at least one piece of feedback.'; return; }
                    submitBtn.disabled = true;
                    submitBtn.textContent = 'Submitting...';
                    var body = {
                        action: 'feedback',
                        user_name: USER,
                        briefing_date: briefingDate,
                        section: 'combined',
                        responses: {
                            useful: feedbackState.useful,
                            best_sections: feedbackState.bestSections,
                            change_request: feedbackState.changeRequest,
                            add_remove: feedbackState.addRemove,
                            reading_experience: feedbackState.readingExperience,
                            content_amount: feedbackState.contentAmount,
                            looks: feedbackState.looks,
                            improvement: feedbackState.improvement,
                            general_comments: feedbackState.generalComments
                        }
                    };
                    fetch(API, { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(body) })
                        .then(function(res) { if (!res.ok) throw new Error('HTTP ' + res.status); msg.className = 'feedback-msg success'; msg.textContent = 'Thank you! Your feedback has been submitted.'; submitBtn.textContent = 'Submitted &#10003;'; })
                        .catch(function(err) { console.error(err); msg.className = 'feedback-msg error'; msg.textContent = 'Failed to submit. Please try again.'; submitBtn.disabled = false; submitBtn.textContent = 'Submit Feedback'; });
                });
            }
        }

        init();
    })();
    </script>
</body>
</html>
