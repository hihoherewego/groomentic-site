<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Erin's Morning Briefing — Purrf Cat Grooming</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap');
        *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            background: #0a0a1a; color: #e0e0f0;
            min-height: 100vh; overflow-x: hidden; line-height: 1.6;
        }
        .orb { position: fixed; border-radius: 50%; filter: blur(80px); opacity: 0.4; animation: float 20s ease-in-out infinite; pointer-events: none; z-index: 0; }
        .orb-1 { width: 500px; height: 500px; background: radial-gradient(circle, #6366f1, transparent); top: -10%; left: -10%; }
        .orb-2 { width: 400px; height: 400px; background: radial-gradient(circle, #a855f7, transparent); top: 40%; right: -8%; animation-delay: -7s; }
        .orb-3 { width: 350px; height: 350px; background: radial-gradient(circle, #ec4899, transparent); bottom: -5%; left: 20%; animation-delay: -14s; }
        @keyframes float {
            0%, 100% { transform: translate(0, 0) scale(1); }
            33% { transform: translate(30px, -40px) scale(1.05); }
            66% { transform: translate(-20px, 20px) scale(0.95); }
        }
        .container { position: relative; z-index: 1; max-width: 720px; margin: 0 auto; padding: 24px 16px 60px; }
        .glass { background: rgba(255,255,255,0.06); backdrop-filter: blur(16px); -webkit-backdrop-filter: blur(16px); border: 1px solid rgba(255,255,255,0.1); border-radius: 16px; padding: 24px; margin-bottom: 20px; transition: transform 0.2s ease, box-shadow 0.2s ease; }
        .glass:hover { transform: translateY(-2px); box-shadow: 0 8px 32px rgba(99,102,241,0.15); }
        .header { text-align: center; padding: 40px 0 20px; }
        .header .logo { font-size: 2.2rem; margin-bottom: 4px; }
        .header h1 { font-size: 1.6rem; font-weight: 600; background: linear-gradient(135deg, #c084fc, #818cf8, #67e8f9); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; }
        .header .date { font-size: 0.95rem; color: rgba(255,255,255,0.5); margin-top: 6px; }
        .header .subline { font-size: 0.85rem; color: rgba(255,255,255,0.35); margin-top: 4px; }
        .section-icon { font-size: 1.3rem; margin-right: 8px; vertical-align: middle; }
        .section-title { font-size: 1.1rem; font-weight: 600; margin-bottom: 14px; display: flex; align-items: center; }
        .tip-card { border-left: 3px solid #a78bfa; }
        .tip-label { font-size: 0.75rem; text-transform: uppercase; letter-spacing: 1.5px; color: #a78bfa; margin-bottom: 8px; font-weight: 600; }
        .tip-text { font-size: 0.95rem; color: rgba(255,255,255,0.85); }
        .news-item { padding: 10px 0; border-bottom: 1px solid rgba(255,255,255,0.06); }
        .news-item:last-child { border-bottom: none; }
        .news-item a { color: #93c5fd; text-decoration: none; font-size: 0.93rem; line-height: 1.5; display: block; transition: color 0.2s; }
        .news-item a:hover { color: #bfdbfe; text-decoration: underline; }
        .news-source { font-size: 0.75rem; color: rgba(255,255,255,0.35); margin-top: 2px; }
        .news-category { display: inline-block; font-size: 0.72rem; padding: 3px 10px; border-radius: 20px; margin-bottom: 6px; font-weight: 500; }
        .news-category-iran { background: rgba(248,113,113,0.2); color: #fca5a5; }
        .news-category-perth { background: rgba(45,212,191,0.2); color: #5eead4; }
        .news-category-ai { background: rgba(167,139,250,0.2); color: #c4b5fd; }
        .news-category-good { background: rgba(74,222,128,0.2); color: #86efac; }

        /* Rich client cards */
        .depart-banner {
            background: linear-gradient(135deg, rgba(248,113,113,0.12), rgba(251,191,36,0.08));
            border: 1px solid rgba(248,113,113,0.2);
            border-radius: 14px;
            padding: 14px 18px;
            margin-bottom: 18px;
            display: flex;
            align-items: center;
            gap: 12px;
            font-size: 0.92rem;
            font-weight: 600;
            color: #fca5a5;
        }
        .depart-banner .depart-time { font-size: 1.15rem; font-weight: 700; color: #fbbf24; }
        .depart-banner .tag-mobile { display: inline-block; font-size: 0.72rem; font-weight: 600; padding: 3px 10px; border-radius: 20px; background: rgba(248,113,113,0.15); color: #fca5a5; text-transform: uppercase; letter-spacing: 0.5px; margin-left: auto; }

        .peak-hour-card {
            background: rgba(255,255,255,0.03);
            border: 1px solid rgba(255,255,255,0.08);
            border-radius: 14px;
            padding: 12px 16px;
            margin-bottom: 18px;
            font-size: 0.9rem;
            color: rgba(255,255,255,0.75);
            display: flex;
            align-items: center;
            gap: 10px;
            flex-wrap: wrap;
        }
        .peak-hour-card .ph-total { color: #f0efff; font-weight: 600; }
        .peak-hour-card .ph-penalty { color: #fbbf24; font-weight: 600; }
        .peak-hour-card .ph-penalty-none { color: #86efac; font-weight: 600; }
        .peak-hour-card .ph-note { font-size: 0.75rem; color: rgba(255,255,255,0.35); margin-left: auto; }

        .client-card {
            background: rgba(255,255,255,0.04);
            border: 1px solid rgba(255,255,255,0.07);
            border-radius: 16px;
            padding: 20px;
            margin-bottom: 16px;
        }
        .client-card:last-child { margin-bottom: 0; }
        .client-header { display: flex; justify-content: space-between; align-items: flex-start; flex-wrap: wrap; gap: 8px; margin-bottom: 10px; }
        .client-name { font-size: 1.1rem; font-weight: 700; color: #f0efff; }
        .client-meta { font-size: 0.82rem; color: rgba(255,255,255,0.45); margin-top: 2px; }
        .tag { display: inline-block; font-size: 0.72rem; font-weight: 600; padding: 3px 10px; border-radius: 20px; text-transform: uppercase; letter-spacing: 0.5px; }
        .tag-confirmed { background: rgba(74,222,128,0.2); color: #86efac; }
        .tag-unconfirmed { background: rgba(251,191,36,0.2); color: #fde68a; }
        .tag-new { background: rgba(52,211,153,0.2); color: #6ee7b7; }

        .service-line { display: flex; justify-content: space-between; align-items: center; padding: 5px 0; font-size: 0.88rem; flex-wrap: wrap; gap: 4px; }
        .service-name { color: rgba(255,255,255,0.7); }
        .service-price { color: #4ade80; font-weight: 600; }

        .address-line {
            font-size: 0.82rem;
            color: rgba(255,255,255,0.45);
            margin: 10px 0;
            padding: 8px 12px;
            background: rgba(255,255,255,0.03);
            border-radius: 10px;
        }

        .cat-card {
            background: rgba(167,139,250,0.08);
            border: 1px solid rgba(167,139,250,0.15);
            border-radius: 12px;
            padding: 12px 14px;
            margin: 10px 0;
        }
        .cat-card h4 { font-size: 0.92rem; font-weight: 600; color: #c4b5fd; margin-bottom: 2px; }
        .cat-card p { font-size: 0.85rem; color: rgba(255,255,255,0.65); margin: 0; line-height: 1.5; }

        .behaviour-summary {
            background: rgba(96,165,250,0.06);
            border-left: 3px solid rgba(96,165,250,0.4);
            padding: 12px 14px;
            border-radius: 0 10px 10px 0;
            margin: 10px 0;
            font-size: 0.85rem;
            color: rgba(255,255,255,0.7);
            line-height: 1.6;
            white-space: pre-line;
        }

        .revenue-total {
            text-align: right;
            font-size: 1.3rem;
            font-weight: 700;
            color: #4ade80;
            padding: 16px 0 0;
            border-top: 1px solid rgba(255,255,255,0.08);
            margin-top: 8px;
        }
        .revenue-label { font-size: 0.82rem; font-weight: 400; color: rgba(255,255,255,0.5); }

        .no-appointments { text-align: center; padding: 30px; color: rgba(255,255,255,0.4); font-style: italic; }

        /* Feedback */
        .feedback-item { background: rgba(255,255,255,0.03); border-radius: 12px; padding: 14px; border: 1px solid rgba(255,255,255,0.06); }
        .feedback-item-label { font-size: 0.8rem; color: rgba(255,255,255,0.5); text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 10px; font-weight: 600; display: block; }
        .toggle-row { display: flex; gap: 8px; margin-bottom: 12px; }
        .toggle-btn { flex: 1; padding: 10px 12px; background: rgba(255,255,255,0.04); border: 1px solid rgba(255,255,255,0.1); border-radius: 10px; color: rgba(255,255,255,0.6); font-size: 0.85rem; font-weight: 500; cursor: pointer; transition: all 0.2s; }
        .toggle-btn:hover { border-color: rgba(255,255,255,0.25); }
        .toggle-btn.active { background: rgba(99,102,241,0.25); border-color: rgba(99,102,241,0.5); color: #c4b5fd; }
        .feedback-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 16px; }
        .tag-grid { display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 12px; }
        .tag-btn { padding: 6px 14px; border-radius: 20px; font-size: 0.82rem; cursor: pointer; border: 1px solid rgba(255,255,255,0.12); background: rgba(255,255,255,0.04); color: rgba(255,255,255,0.6); transition: all 0.2s; }
        .tag-btn.active { background: rgba(99,102,241,0.25); border-color: rgba(99,102,241,0.5); color: #c4b5fd; }
        .tag-btn:hover { border-color: rgba(255,255,255,0.25); }
        textarea.glass-input { width: 100%; padding: 12px 14px; background: rgba(255,255,255,0.06); border: 1px solid rgba(255,255,255,0.1); border-radius: 10px; color: #e0e0f0; font-size: 0.9rem; font-family: inherit; resize: vertical; min-height: 70px; margin-bottom: 12px; }
        textarea.glass-input::placeholder { color: rgba(255,255,255,0.3); }
        textarea.glass-input:focus { outline: none; border-color: rgba(167,139,250,0.5); box-shadow: 0 0 0 3px rgba(167,139,250,0.1); }
        .submit-btn { display: block; width: 100%; padding: 14px; border: none; border-radius: 12px; font-size: 1rem; font-weight: 600; cursor: pointer; background: linear-gradient(135deg, #6366f1, #a855f7); color: white; transition: all 0.3s; margin-top: 8px; }
        .submit-btn:hover { transform: translateY(-1px); box-shadow: 0 6px 20px rgba(99,102,241,0.4); }
        .submit-btn:active { transform: translateY(0); }
        .submit-btn:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }
        .feedback-msg { text-align: center; padding: 12px; border-radius: 10px; margin-top: 12px; font-size: 0.9rem; display: none; }
        .feedback-msg.success { display: block; background: rgba(52,211,153,0.12); color: #6ee7b7; }
        .feedback-msg.error { display: block; background: rgba(239,68,68,0.12); color: #fca5a5; }
        .links-grid { display: grid; gap: 8px; }
        .link-item a { color: #93c5fd; text-decoration: none; font-size: 0.88rem; transition: color 0.2s; }
        .link-item a:hover { color: #bfdbfe; text-decoration: underline; }
        .footer { text-align: center; padding: 30px 0; font-size: 0.78rem; color: rgba(255,255,255,0.25); }
        .footer a { color: rgba(255,255,255,0.35); text-decoration: none; }
        .footer a:hover { color: rgba(255,255,255,0.5); }
        .loading { text-align: center; padding: 60px 20px; }
        .spinner { width: 36px; height: 36px; border: 3px solid rgba(255,255,255,0.1); border-top-color: #a78bfa; border-radius: 50%; animation: spin 0.8s linear infinite; margin: 0 auto 16px; }
        @keyframes spin { to { transform: rotate(360deg); } }
        .loading-text { color: rgba(255,255,255,0.4); font-size: 0.9rem; }
        .error-state { text-align: center; padding: 40px 20px; color: rgba(255,255,255,0.5); }
        .error-state .icon { font-size: 2rem; margin-bottom: 12px; }
        @media (max-width: 500px) {
            .container { padding: 16px 10px 40px; }
            .glass { padding: 18px 16px; }
            .header h1 { font-size: 1.3rem; }
            .feedback-grid { grid-template-columns: 1fr; }
            .toggle-row { flex-direction: column; }
            .toggle-btn { width: 100%; }
            .depart-banner { flex-wrap: wrap; }
        }
    </style>
</head>
<body data-user="erin">
    <div class="orb orb-1"></div>
    <div class="orb orb-2"></div>
    <div class="orb orb-3"></div>
    <div class="container">
        <div class="header">
            <div class="logo">&#x1F431;</div>
            <h1>Good Morning, Erin</h1>
            <div class="date" id="headerDate">Loading...</div>
            <div class="subline" id="headerSubline"></div>
        </div>
        <div id="content">
            <div class="loading">
                <div class="spinner"></div>
                <div class="loading-text">Fetching your briefing...</div>
            </div>
        </div>
    </div>
    <script>
    (function() {
        var USER = document.body.getAttribute('data-user') || 'paul';
        var API = 'https://duwwfbohvptdsgrvlskj.supabase.co/functions/v1/serve-morning-briefing';
        var feedbackState = {
            useful: '', bestSections: [], changeRequest: '', addRemove: '',
            readingExperience: '', contentAmount: '', looks: '', improvement: '', generalComments: ''
        };

        function init() {
            fetch(API + '?name=' + USER + '&format=json')
                .then(function(res) { if (!res.ok) throw new Error('HTTP ' + res.status); return res.json(); })
                .then(function(row) {
                    if (!row || (!row.data && !row.json_data && !row.html_content)) { showError('No briefing available yet today. Check back after 5:00 AM.'); return; }
                    var data = row.data || row.json_data;
                    if (!data) { showError('Briefing data is still in legacy format. A new briefing will be generated tomorrow.'); return; }
                    render(data, row.briefing_date);
                })
                .catch(function(err) { console.error(err); showError('Could not load briefing. Please try refreshing.'); });
        }

        function showError(msg) {
            document.getElementById('content').innerHTML = '<div class="glass error-state"><div class="icon">&#128575;</div><p>' + msg + '</p></div>';
        }

        function esc(s) { if (!s) return ''; return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
        function escAttr(s) { if (!s) return ''; return String(s).replace(/&/g,'&amp;').replace(/"/g,'&quot;').replace(/'/g,'&#39;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
        function money(cents) { if (!cents) return '$0'; var d = cents / 100; return d % 1 === 0 ? '$' + d : '$' + d.toFixed(2); }

        function getCategoryClass(label) {
            if (!label) return '';
            var l = label.toLowerCase();
            if (l.includes('iran') || l.includes('war')) return 'news-category-iran';
            if (l.includes('perth') || l.includes('local')) return 'news-category-perth';
            if (l.includes('claude') || l.includes('ai')) return 'news-category-ai';
            if (l.includes('good')) return 'news-category-good';
            return 'news-category-ai';
        }

        function render(data, briefingDate) {
            document.getElementById('headerDate').textContent = data.displayDate || briefingDate;
            var clients = data.clients || [];
            var news = data.news || [];
            var f1 = data.f1 || [];
            var tip = data.tip || null;
            var totalCents = data.totalRevenueCents || 0;
            var count = data.appointmentCount || clients.length;

            // Header subline
            var subParts = [];
            if (count > 0) subParts.push(count + ' appointment' + (count !== 1 ? 's' : ''));
            else subParts.push('No appointments today');
            if (data.hasMobileDay) subParts.push('Mobile day');
            document.getElementById('headerSubline').textContent = subParts.join(' \u2022 ');

            var html = '';

            // Claude Tip
            if (tip) {
                var tipText = '';
                if (typeof tip === 'string') tipText = esc(tip);
                else if (tip.title && tip.body) tipText = '<strong>' + esc(tip.title) + '</strong> \u2014 ' + esc(tip.body);
                else if (tip.body) tipText = esc(tip.body);
                html += '<div class="glass tip-card"><div class="tip-label">Claude Tip of the Day</div><div class="tip-text">' + tipText + '</div></div>';
            }

            // Curated News
            if (news.length) {
                html += '<div class="glass"><div class="section-title"><span class="section-icon">&#127462;&#127482;</span> Curated News</div>';
                news.forEach(function(n) {
                    html += '<div class="news-item">';
                    if (n.label && n.emoji) html += '<span class="news-category ' + getCategoryClass(n.label) + '">' + esc(n.emoji) + ' ' + esc(n.label) + '</span>';
                    html += '<a href="' + escAttr(n.link) + '" target="_blank" rel="noopener">' + esc(n.title) + '</a>';
                    if (n.source) html += '<div class="news-source">' + esc(n.source) + '</div>';
                    html += '</div>';
                });
                html += '</div>';
            }

            // F1 News
            if (f1.length) {
                html += '<div class="glass"><div class="section-title"><span class="section-icon">&#127950;&#65039;</span> Formula 1</div>';
                f1.forEach(function(n) {
                    html += '<div class="news-item"><a href="' + escAttr(n.link) + '" target="_blank" rel="noopener">' + esc(n.title) + '</a>';
                    if (n.source) html += '<div class="news-source">' + esc(n.source) + '</div>';
                    html += '</div>';
                });
                html += '</div>';
            }

            // === TODAY'S SCHEDULE (Rich Client Cards) ===
            html += '<div class="glass"><div class="section-title"><span class="section-icon">&#128197;</span> Today\'s Schedule</div>';

            if (clients.length === 0) {
                html += '<div class="no-appointments">No appointments scheduled for today.</div>';
            } else {
                // Departure banner for mobile days
                if (data.departureBanner) {
                    var db = data.departureBanner;
                    html += '<div class="depart-banner">';
                    html += '<span>&#x1F697;</span>';
                    html += '<span>Depart by <span class="depart-time">' + esc(db.depart_time) + '</span> \u2192 ' + esc(db.first_stop) + ' first</span>';
                    html += '<span class="tag-mobile">Mobile Day</span>';
                    html += '</div>';
                }

                // S78: seeded from tenant_settings.mobile_days=['friday']. Reconcile with shared config in S79.
                // Belt-and-braces day-guard — server pipeline already nulls peakHour on non-mobile days.
                var __briefingDayIdx = new Date(briefingDate + 'T00:00:00').getDay();
                var __isMobileDay = __briefingDayIdx === 5; // Friday
                // Peak-hour route summary (mobile days only, when computation succeeded)
                if (__isMobileDay && data.peakHour && data.peakHour.peakMinutes > 0) {
                    var ph = data.peakHour;
                    function formatMins(m) {
                        if (m == null) return '';
                        if (m < 60) return 'about ' + m + ' min';
                        var hrs = Math.floor(m / 60);
                        var rem = m % 60;
                        return rem > 0 ? 'about ' + hrs + 'h ' + rem + 'm' : 'about ' + hrs + 'h';
                    }
                    var totalLabel = formatMins(ph.peakMinutes) + ' of driving today';
                    var penaltyLabel;
                    if (ph.penaltyMinutes >= 5) {
                        penaltyLabel = '<span class="ph-penalty">peak traffic adds ' + formatMins(ph.penaltyMinutes).replace('about ', 'about +') + '</span>';
                    } else {
                        penaltyLabel = '<span class="ph-penalty-none">no peak-hour penalty</span>';
                    }
                    html += '<div class="peak-hour-card">';
                    html += '<span>&#x1F6E3;&#xFE0F;</span>';
                    html += '<span class="ph-total">' + esc(totalLabel) + '</span>';
                    html += '<span>\u2014</span>';
                    html += penaltyLabel;
                    html += '<span class="ph-note">' + ph.stopCount + ' stop' + (ph.stopCount === 1 ? '' : 's') + ' \u2022 Google pessimistic traffic</span>';
                    html += '</div>';
                }

                clients.forEach(function(c) {
                    html += '<div class="client-card">';

                    // Client header: name + visit label + confirmation tag
                    html += '<div class="client-header"><div>';
                    var nameLabel = esc(c.name);
                    if (c.visit_label) nameLabel += ' \u2014 ' + esc(c.visit_label);
                    html += '<div class="client-name">' + nameLabel + '</div>';
                    // Meta: client since, phone
                    var metaParts = [];
                    if (c.client_since) metaParts.push('Client since ' + esc(c.client_since));
                    if (c.phone) metaParts.push(esc(c.phone));
                    if (metaParts.length) html += '<div class="client-meta">' + metaParts.join(' \u2022 ') + '</div>';
                    html += '</div>';
                    // Confirmation tag
                    if (c.is_confirmed) {
                        html += '<span class="tag tag-confirmed">Confirmed</span>';
                    } else if (c.is_new) {
                        html += '<span class="tag tag-new">New Client</span>';
                    } else {
                        html += '<span class="tag tag-unconfirmed">Unconfirmed</span>';
                    }
                    html += '</div>';

                    // Service lines with per-pet pricing
                    var services = c.services || [];
                    services.forEach(function(s) {
                        if (s.name === 'Let Paul Decide' && !s.price) return;
                        html += '<div class="service-line">';
                        var svcLabel = s.pet_name ? esc(s.pet_name) + ' \u2014 ' + esc(s.name) : esc(s.name);
                        html += '<span class="service-name">' + svcLabel + '</span>';
                        if (s.price > 0) html += '<span class="service-price">' + money(s.price) + '</span>';
                        html += '</div>';
                    });

                    // Time range
                    if (c.time_range) {
                        html += '<div class="client-meta" style="margin-top:4px;">' + esc(c.time_range) + '</div>';
                    } else if (c.time) {
                        html += '<div class="client-meta" style="margin-top:4px;">' + esc(c.time) + (c.duration ? ' \u2022 ' + c.duration + ' min' : '') + '</div>';
                    }

                    // Drive time + suburb (replaces pin address)
                    if (c.drive_time_label) {
                        var driveText = '&#x1F697; ' + esc(c.drive_time_label);
                        var addrParts = (c.address || '').split(',').map(function(s) { return s.trim(); });
                        var suburb = addrParts.length > 1 ? addrParts[1] : (addrParts[0] || '');
                        if (suburb) driveText += ' from ' + esc(suburb);
                        if (c.access_notes) driveText += ' \u2022 ' + esc(c.access_notes);
                        html += '<div class="address-line">' + driveText + '</div>';
                    } else if (c.address) {
                        var addrText = '&#x1F4CD; ' + esc(c.address);
                        if (c.access_notes) addrText += ' \u2022 ' + esc(c.access_notes);
                        html += '<div class="address-line">' + addrText + '</div>';
                    }

                    // Cat cards
                    var pets = c.pets || [];
                    if (pets.length > 0) {
                        html += '<div class="cat-card">';
                        var firstPet = pets[0];
                        var petParts = ['&#x1F431; ' + esc(firstPet.name)];
                        if (firstPet.breed) petParts.push(esc(firstPet.breed));
                        if (firstPet.sex) petParts.push(esc(firstPet.sex));
                        if (firstPet.age) petParts.push(esc(firstPet.age));
