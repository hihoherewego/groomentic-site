<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Erin's Morning Briefing — Purrf Cat Grooming</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap');
        *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            background: #F0EEE9; color: #1F2937;
            min-height: 100vh; overflow-x: hidden; line-height: 1.6;
        }
        .container { position: relative; z-index: 1; max-width: 720px; margin: 0 auto; padding: 24px 16px 60px; }
        .glass { background: #F4EEE0; border: 1px solid #E9E5DD; border-radius: 16px; padding: 24px; margin-bottom: 20px; transition: transform 0.2s ease, box-shadow 0.2s ease; }
        .glass:hover { transform: translateY(-2px); box-shadow: 0 4px 16px rgba(0,0,0,0.06); }
        .header { text-align: center; padding: 40px 0 20px; }
        .header .logo { font-size: 2.2rem; margin-bottom: 4px; }
        .header h1 { font-size: 1.6rem; font-weight: 600; color: #5E4B66; }
        .header .date { font-size: 0.95rem; color: #6B7280; margin-top: 6px; }
        .header .subline { font-size: 0.85rem; color: #9CA3AF; margin-top: 4px; }
        .section-icon { font-size: 1.3rem; margin-right: 8px; vertical-align: middle; }
        .section-title { font-size: 1.1rem; font-weight: 600; margin-bottom: 14px; display: flex; align-items: center; color: #1F2937; }
        .tip-card { border-left: 3px solid #A693AC; }
        .tip-label { font-size: 0.75rem; text-transform: uppercase; letter-spacing: 1.5px; color: #A693AC; margin-bottom: 8px; font-weight: 600; }
        .tip-text { font-size: 0.95rem; color: #374151; }
        .news-item { padding: 10px 0; border-bottom: 1px solid rgba(0,0,0,0.06); }
        .news-item:last-child { border-bottom: none; }
        .news-item a { color: #5E4B66; text-decoration: none; font-size: 0.93rem; line-height: 1.5; display: block; transition: color 0.2s; }
        .news-item a:hover { color: #A693AC; text-decoration: underline; }
        .news-source { font-size: 0.75rem; color: #6B7280; margin-top: 2px; }
        .news-category { display: inline-block; font-size: 0.72rem; padding: 3px 10px; border-radius: 20px; margin-bottom: 6px; font-weight: 500; }
        .news-category-iran { background: #FEE2E2; color: #B91C1C; }
        .news-category-perth { background: #CCFBF1; color: #0F766E; }
        .news-category-ai { background: #E8E0EC; color: #5E4B66; }
        .news-category-good { background: #D1FAE5; color: #047857; }

        /* Rich client cards */
        .depart-banner {
            background: #FEF3C7;
            border: 1px solid #FDE68A;
            border-radius: 14px;
            padding: 14px 18px;
            margin-bottom: 18px;
            display: flex;
            align-items: center;
            gap: 12px;
            font-size: 0.92rem;
            font-weight: 600;
            color: #92400E;
        }
        .depart-banner .depart-time { font-size: 1.15rem; font-weight: 700; color: #B45309; }
        .depart-banner .tag-mobile { display: inline-block; font-size: 0.72rem; font-weight: 600; padding: 3px 10px; border-radius: 20px; background: #FCD34D; color: #78350F; text-transform: uppercase; letter-spacing: 0.5px; margin-left: auto; }

        .peak-hour-card {
            background: rgba(0,0,0,0.02);
            border: 1px solid #E5E7EB;
            border-radius: 14px;
            padding: 12px 16px;
            margin-bottom: 18px;
            font-size: 0.9rem;
            color: #4B5563;
            display: flex;
            align-items: center;
            gap: 10px;
            flex-wrap: wrap;
        }
        .peak-hour-card .ph-total { color: #1F2937; font-weight: 600; }
        .peak-hour-card .ph-penalty { color: #D97706; font-weight: 600; }
        .peak-hour-card .ph-penalty-none { color: #047857; font-weight: 600; }
        .peak-hour-card .ph-note { font-size: 0.75rem; color: #6B7280; margin-left: auto; }

        .client-card {
            background: white;
            border: 1px solid #E9E5DD;
            border-radius: 16px;
            padding: 20px;
            margin-bottom: 16px;
        }
        .client-card:last-child { margin-bottom: 0; }
        .client-header { display: flex; justify-content: space-between; align-items: flex-start; flex-wrap: wrap; gap: 8px; margin-bottom: 10px; }
        .client-name { font-size: 1.1rem; font-weight: 700; color: #1F2937; }
        .client-meta { font-size: 0.82rem; color: #6B7280; margin-top: 2px; }
        .tag { display: inline-block; font-size: 0.72rem; font-weight: 600; padding: 3px 10px; border-radius: 20px; text-transform: uppercase; letter-spacing: 0.5px; }
        .tag-confirmed { background: #D1FAE5; color: #047857; }
        .tag-unconfirmed { background: #FEF3C7; color: #B45309; }
        .tag-new { background: #FED7AA; color: #B45309; }

        .service-line { display: flex; justify-content: space-between; align-items: center; padding: 5px 0; font-size: 0.88rem; flex-wrap: wrap; gap: 4px; }
        .service-name { color: #4B5563; }
        .service-price { color: #047857; font-weight: 600; }

        .address-line {
            font-size: 0.82rem;
            color: #6B7280;
            margin: 10px 0;
            padding: 8px 12px;
            background: #F9F8F6;
            border-radius: 10px;
        }

        .cat-card {
            background: #F3EFF5;
            border: 1px solid #C4B5CB;
            border-radius: 12px;
            padding: 12px 14px;
            margin: 10px 0;
        }
        .cat-card h4 { font-size: 0.92rem; font-weight: 600; color: #5E4B66; margin-bottom: 2px; }
        .cat-card p { font-size: 0.85rem; color: #4B5563; margin: 0; line-height: 1.5; }

        .behaviour-summary {
            background: #EFF6FF;
            border-left: 3px solid #7AB6D9;
            padding: 12px 14px;
            border-radius: 0 10px 10px 0;
            margin: 10px 0;
            font-size: 0.85rem;
            color: #374151;
            line-height: 1.6;
            white-space: pre-line;
        }

        .revenue-total {
            text-align: right;
            font-size: 1.3rem;
            font-weight: 700;
            color: #047857;
            padding: 16px 0 0;
            border-top: 1px solid #E9E5DD;
            margin-top: 8px;
        }
        .revenue-label { font-size: 0.82rem; font-weight: 400; color: #6B7280; }

        .no-appointments { text-align: center; padding: 30px; color: #9CA3AF; font-style: italic; }

        /* Feedback */
        .feedback-item { background: #F9F8F6; border-radius: 12px; padding: 14px; border: 1px solid #E9E5DD; }
        .feedback-item-label { font-size: 0.8rem; color: #6B7280; text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 10px; font-weight: 600; display: block; }
        .toggle-row { display: flex; gap: 8px; margin-bottom: 12px; }
        .toggle-btn { flex: 1; padding: 10px 12px; background: white; border: 1px solid #D1D5DB; border-radius: 10px; color: #4B5563; font-size: 0.85rem; font-weight: 500; cursor: pointer; transition: all 0.2s; }
        .toggle-btn:hover { border-color: #A693AC; }
        .toggle-btn.active { background: #E8E0EC; border-color: #A693AC; color: #5E4B66; }
        .feedback-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 16px; }
        .tag-grid { display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 12px; }
        .tag-btn { padding: 6px 14px; border-radius: 20px; font-size: 0.82rem; cursor: pointer; border: 1px solid #D1D5DB; background: white; color: #4B5563; transition: all 0.2s; }
        .tag-btn.active { background: #E8E0EC; border-color: #A693AC; color: #5E4B66; }
        .tag-btn:hover { border-color: #A693AC; }
        textarea.glass-input { width: 100%; padding: 12px 14px; background: white; border: 1px solid #D1D5DB; border-radius: 10px; color: #1F2937; font-size: 0.9rem; font-family: inherit; resize: vertical; min-height: 70px; margin-bottom: 12px; }
        textarea.glass-input::placeholder { color: #9CA3AF; }
        textarea.glass-input:focus { outline: none; border-color: #A693AC; box-shadow: 0 0 0 3px rgba(166,147,172,0.18); }
        .submit-btn { display: block; width: 100%; padding: 14px; border: none; border-radius: 12px; font-size: 1rem; font-weight: 600; cursor: pointer; background: #A693AC; color: white; transition: all 0.3s; margin-top: 8px; }
        .submit-btn:hover { background: #8B7893; transform: translateY(-1px); box-shadow: 0 6px 20px rgba(166,147,172,0.35); }
        .submit-btn:active { transform: translateY(0); }
        .submit-btn:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }
        .feedback-msg { text-align: center; padding: 12px; border-radius: 10px; margin-top: 12px; font-size: 0.9rem; display: none; }
        .feedback-msg.success { display: block; background: #D1FAE5; color: #047857; }
        .feedback-msg.error { display: block; background: #FEE2E2; color: #B91C1C; }
        .links-grid { display: grid; gap: 8px; }
        .link-item a { color: #5E4B66; text-decoration: none; font-size: 0.88rem; transition: color 0.2s; }
        .link-item a:hover { color: #A693AC; text-decoration: underline; }
        .footer { text-align: center; padding: 30px 0; font-size: 0.78rem; color: #9CA3AF; }
        .footer a { color: #6B7280; text-decoration: none; }
        .footer a:hover { color: #A693AC; }
        .loading { text-align: center; padding: 60px 20px; }
        .spinner { width: 36px; height: 36px; border: 3px solid #E9E5DD; border-top-color: #A693AC; border-radius: 50%; animation: spin 0.8s linear infinite; margin: 0 auto 16px; }
        @keyframes spin { to { transform: rotate(360deg); } }
        .loading-text { color: #6B7280; font-size: 0.9rem; }
        .error-state { text-align: center; padding: 40px 20px; color: #6B7280; }
        .error-state .icon { font-size: 2rem; margin-bottom: 12px; }
        /* Per-pet header row (S144 modal-parity) */
        .pet-header { display: flex; align-items: center; gap: 14px; margin-bottom: 14px; padding-bottom: 14px; border-bottom: 1px solid #E9E5DD; }
        .pet-photo { width: 60px; height: 60px; border-radius: 50%; object-fit: cover; background: #F3EFF5; flex-shrink: 0; border: 2px solid #C4B5CB; }
        .pet-photo-fallback { display: flex; align-items: center; justify-content: center; font-family: Georgia, serif; font-size: 1.6rem; color: #5E4B66; font-weight: 600; }
        .pet-meta { flex: 1; min-width: 0; }
        .pet-name { font-family: Georgia, serif; font-style: italic; font-size: 1.4rem; color: #1F2937; line-height: 1.1; }
        .pet-meta-line { font-size: 0.78rem; color: #6B7280; text-transform: uppercase; letter-spacing: 0.08em; margin-top: 4px; display: flex; gap: 8px; flex-wrap: wrap; align-items: center; }
        .pet-meta-line .candle { color: #B45309; }
        .pet-meta-line .breed { font-weight: 500; color: #4B5563; }
        .pet-meta-line .visits { color: #9CA3AF; }
        .pet-block { margin: 16px 0; }

        /* Two-column grid for AI panels */
        .info-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; margin-top: 16px; }
        .info-panel { background: #F9F8F6; border: 1px solid #E9E5DD; border-radius: 12px; padding: 14px 16px; }
        .info-panel-title { font-size: 0.72rem; text-transform: uppercase; letter-spacing: 0.08em; color: #A693AC; font-weight: 600; margin-bottom: 10px; }
        .info-panel-title.ai { color: #5E4B66; }
        .info-panel-title.history { color: #4A9BC7; }
        .info-panel-body { font-size: 0.88rem; color: #374151; line-height: 1.55; }
        .info-panel-body p { margin-bottom: 8px; }
        .info-panel-body p:last-child { margin-bottom: 0; }
        .info-panel-body strong { color: #1F2937; }

        /* Appointment details panel: key-value rows */
        .detail-row { display: flex; justify-content: space-between; gap: 12px; padding: 4px 0; font-size: 0.84rem; }
        .detail-key { color: #6B7280; text-transform: uppercase; letter-spacing: 0.05em; font-size: 0.72rem; }
        .detail-val { color: #1F2937; text-align: right; font-weight: 500; }

        /* Previous history rows */
        .history-row { padding: 8px 0; border-bottom: 1px solid #E9E5DD; font-size: 0.85rem; }
        .history-row:last-child { border-bottom: none; }
        .history-date { color: #4A9BC7; font-weight: 600; font-size: 0.78rem; text-transform: uppercase; letter-spacing: 0.04em; }
        .history-services { color: #1F2937; margin-top: 2px; }
        .history-notes { color: #6B7280; font-size: 0.8rem; margin-top: 4px; font-style: italic; }

        /* Empty placeholders */
        .empty-notes { color: #9CA3AF; font-style: italic; font-size: 0.85rem; margin: 0; }

        @media (max-width: 500px) {
            .container { padding: 16px 10px 40px; }
            .glass { padding: 18px 16px; }
            .header h1 { font-size: 1.3rem; }
            .feedback-grid { grid-template-columns: 1fr; }
            .toggle-row { flex-direction: column; }
            .toggle-btn { width: 100%; }
            .depart-banner { flex-wrap: wrap; }
            .info-grid { grid-template-columns: 1fr; }
            .pet-photo { width: 48px; height: 48px; }
            .pet-name { font-size: 1.2rem; }
        }
    </style>
</head>
<body data-user="erin">
    <div class="container">
        <div class="header">
            <div class="logo">&#x1F431;</div>
            <h1>Good Morning, Erin</h1>
            <div class="date" id="headerDate">Loading...</div>
            <div class="subline" id="headerSubline"></div>
        </div>
        <div id="content">
            <div class="loading">
                <div class="spinner"></div>
                <div class="loading-text">Fetching your briefing...</div>
            </div>
        </div>
    </div>
    <script>
    (function() {
        var USER = document.body.getAttribute('data-user') || 'erin';
        var API = 'https://duwwfbohvptdsgrvlskj.supabase.co/functions/v1/serve-morning-briefing';
        var feedbackState = {
            useful: '', bestSections: [], changeRequest: '', addRemove: '',
            readingExperience: '', contentAmount: '', looks: '', improvement: '', generalComments: ''
        };

        function init() {
            fetch(API + '?name=' + USER + '&format=json')
                .then(function(res) { if (!res.ok) throw new Error('HTTP ' + res.status); return res.json(); })
                .then(function(row) {
                    if (!row || (!row.data && !row.json_data && !row.html_content)) { showError('No briefing available yet today. Check back after 5:00 AM.'); return; }
                    var data = row.data || row.json_data;
                    if (!data) { showError('Briefing data is still in legacy format. A new briefing will be generated tomorrow.'); return; }
                    render(data, row.briefing_date);
                })
                .catch(function(err) { console.error(err); showError('Could not load briefing. Please try refreshing.'); });
        }

        function showError(msg) {
            document.getElementById('content').innerHTML = '<div class="glass error-state"><div class="icon">&#128575;</div><p>' + msg + '</p></div>';
        }

        function esc(s) { if (!s) return ''; return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
        function escAttr(s) { if (!s) return ''; return String(s).replace(/&/g,'&amp;').replace(/"/g,'&quot;').replace(/'/g,'&#39;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
        function money(cents) { if (!cents) return '$0'; var d = cents / 100; return d % 1 === 0 ? '$' + d : '$' + d.toFixed(2); }
        function moneyOrEm(cents) { return cents ? money(cents) : '—'; }
        function paymentLabel(s) { if (!s) return '—'; return String(s).replace(/_/g,' ').toUpperCase(); }
        function md(text) {
            if (!text) return '';
            var out = esc(text);
            out = out.replace(/\*\*([^*\n]+)\*\*/g, '<strong>$1</strong>');
            return out.split(/\n\n+/).map(function(p){ return '<p>' + p.replace(/\n/g,' ') + '</p>'; }).join('');
        }
        function fmtPrevDate(iso) {
            try { var d = new Date(iso); return d.toLocaleDateString('en-AU', { day: 'numeric', month: 'short', year: 'numeric' }); }
            catch(e) { return iso || ''; }
        }

        function getCategoryClass(label) {
            if (!label) return '';
            var l = label.toLowerCase();
            if (l.includes('iran') || l.includes('war')) return 'news-category-iran';
            if (l.includes('perth') || l.includes('local')) return 'news-category-perth';
            if (l.includes('claude') || l.includes('ai')) return 'news-category-ai';
            if (l.includes('good')) return 'news-category-good';
            return 'news-category-ai';
        }

        function render(data, briefingDate) {
            document.getElementById('headerDate').textContent = data.displayDate || briefingDate;
            var clients = data.clients || [];
            var news = data.news || [];
            var f1 = data.f1 || [];
            var tip = data.tip || null;
            var totalCents = data.totalRevenueCents || 0;
            var count = data.appointmentCount || clients.length;

            // Header subline
            var subParts = [];
            if (count > 0) subParts.push(count + ' appointment' + (count !== 1 ? 's' : ''));
            else subParts.push('No appointments today');
            if (data.hasMobileDay) subParts.push('Mobile day');
            document.getElementById('headerSubline').textContent = subParts.join(' \u2022 ');

            var html = '';

            // Claude Tip
            if (tip) {
                var tipText = '';
                if (typeof tip === 'string') tipText = esc(tip);
                else if (tip.title && tip.body) tipText = '<strong>' + esc(tip.title) + '</strong> \u2014 ' + esc(tip.body);
                else if (tip.body) tipText = esc(tip.body);
                html += '<div class="glass tip-card"><div class="tip-label">Claude Tip of the Day</div><div class="tip-text">' + tipText + '</div></div>';
            }

            // === TODAY'S SCHEDULE (Rich Client Cards) ===
            html += '<div class="glass"><div class="section-title"><span class="section-icon">&#128197;</span> Today\'s Schedule</div>';

            if (clients.length === 0) {
                html += '<div class="no-appointments">No appointments scheduled for today.</div>';
            } else {
                // Departure banner for mobile days
                if (data.departureBanner) {
                    var db = data.departureBanner;
                    html += '<div class="depart-banner">';
                    html += '<span>&#x1F697;</span>';
                    html += '<span>Depart by <span class="depart-time">' + esc(db.depart_time) + '</span> \u2192 ' + esc(db.first_stop) + ' first</span>';
                    html += '<span class="tag-mobile">Mobile Day</span>';
                    html += '</div>';
                }

                // S78: seeded from tenant_settings.mobile_days=['friday']. Reconcile with shared config in S79.
                // Belt-and-braces day-guard — server pipeline already nulls peakHour on non-mobile days.
                var __briefingDayIdx = new Date(briefingDate + 'T00:00:00').getDay();
                var __isMobileDay = __briefingDayIdx === 5; // Friday
                // Peak-hour route summary (mobile days only, when computation succeeded)
                if (__isMobileDay && data.peakHour && data.peakHour.peakMinutes > 0) {
                    var ph = data.peakHour;
                    function formatMins(m) {
                        if (m == null) return '';
                        if (m < 60) return 'about ' + m + ' min';
                        var hrs = Math.floor(m / 60);
                        var rem = m % 60;
                        return rem > 0 ? 'about ' + hrs + 'h ' + rem + 'm' : 'about ' + hrs + 'h';
                    }
                    var totalLabel = formatMins(ph.peakMinutes) + ' of driving today';
                    var penaltyLabel;
                    if (ph.penaltyMinutes >= 5) {
                        penaltyLabel = '<span class="ph-penalty">peak traffic adds ' + formatMins(ph.penaltyMinutes).replace('about ', 'about +') + '</span>';
                    } else {
                        penaltyLabel = '<span class="ph-penalty-none">no peak-hour penalty</span>';
                    }
                    html += '<div class="peak-hour-card">';
                    html += '<span>&#x1F6E3;&#xFE0F;</span>';
                    html += '<span class="ph-total">' + esc(totalLabel) + '</span>';
                    html += '<span>\u2014</span>';
                    html += penaltyLabel;
                    html += '<span class="ph-note">' + ph.stopCount + ' stop' + (ph.stopCount === 1 ? '' : 's') + ' \u2022 Google pessimistic traffic</span>';
                    html += '</div>';
                }

                clients.forEach(function(c) {
                    html += '<div class="client-card">';

                    // === Owner header (one per client) ===
                    html += '<div class="client-header"><div>';
                    html += '<div class="client-name">' + esc(c.name) + '</div>';
                    var metaParts = [];
                    if (c.client_since) metaParts.push('Client since ' + esc(c.client_since));
                    if (c.phone) metaParts.push(esc(c.phone));
                    if (metaParts.length) html += '<div class="client-meta">' + metaParts.join(' \u2022 ') + '</div>';
                    html += '</div>';
                    if (c.is_confirmed) html += '<span class="tag tag-confirmed">Confirmed</span>';
                    else if (c.is_new) html += '<span class="tag tag-new">New Client</span>';
                    else html += '<span class="tag tag-unconfirmed">Unconfirmed</span>';
                    html += '</div>';

                    // === Per-pet block (S144 modal-parity) ===
                    var pets = c.pets || [];
                    pets.forEach(function(p) {
                        html += '<div class="pet-block">';

                        // Pet header: photo + name + meta
                        html += '<div class="pet-header">';
                        if (p.photo_key) {
                            html += '<img class="pet-photo" src="https://d-pawfentic-pet-photos.s3.ap-southeast-2.amazonaws.com/' + escAttr(p.photo_key) + '" alt="' + escAttr(p.name) + '" onerror="this.style.display=\'none\';this.nextElementSibling.style.display=\'flex\';">';
                            html += '<div class="pet-photo pet-photo-fallback" style="display:none;">' + esc((p.name || '?').charAt(0).toUpperCase()) + '</div>';
                        } else if (p.photo_url) {
                            html += '<img class="pet-photo" src="' + escAttr(p.photo_url) + '" alt="' + escAttr(p.name) + '" onerror="this.style.display=\'none\';this.nextElementSibling.style.display=\'flex\';">';
                            html += '<div class="pet-photo pet-photo-fallback" style="display:none;">' + esc((p.name || '?').charAt(0).toUpperCase()) + '</div>';
                        } else {
                            html += '<div class="pet-photo pet-photo-fallback">' + esc((p.name || '?').charAt(0).toUpperCase()) + '</div>';
                        }

                        html += '<div class="pet-meta">';
                        html += '<div class="pet-name">' + esc(p.name || 'Unknown') + '</div>';
                        html += '<div class="pet-meta-line">';
                        if (p.age_years != null) html += '<span class="candle">\ud83d\udd25 ' + p.age_years + '</span>';
                        if (p.breed && p.breed !== 'Unknown breed') html += '<span class="breed">' + esc(p.breed) + '</span>';
                        if (p.visit_count) html += '<span class="visits">' + p.visit_count + 'th visit</span>';
                        html += '</div>';
                        html += '</div>';
                        html += '</div>'; // close pet-header

                        // === Two-column grid #1: APPOINTMENT DETAILS + AI SUMMARY ===
                        html += '<div class="info-grid">';
                        // Appointment Details
                        html += '<div class="info-panel">';
                        html += '<div class="info-panel-title">Appointment Details</div>';
                        html += '<div class="info-panel-body">';
                        if (c.time_range) html += '<div class="detail-row"><span class="detail-key">Time</span><span class="detail-val">' + esc(c.time_range) + '</span></div>';
                        if (c.duration) html += '<div class="detail-row"><span class="detail-key">Duration</span><span class="detail-val">' + c.duration + ' min</span></div>';
                        html += '<div class="detail-row"><span class="detail-key">Location</span><span class="detail-val">' + (c.is_mobile ? 'Mobile' : 'Salon') + '</span></div>';
                        if (c.booking_source) html += '<div class="detail-row"><span class="detail-key">Source</span><span class="detail-val">' + esc(c.booking_source) + '</span></div>';
                        var petSvcs = (c.services || []).filter(function(s){ return !s.pet_name || s.pet_name === p.name; }).map(function(s){ return s.name; });
                        if (petSvcs.length) html += '<div class="detail-row"><span class="detail-key">Services</span><span class="detail-val">' + esc(petSvcs.join(', ')) + '</span></div>';
                        html += '<div class="detail-row"><span class="detail-key">Estimated</span><span class="detail-val">' + moneyOrEm(c.revenue_cents) + '</span></div>';
                        html += '<div class="detail-row"><span class="detail-key">Actual</span><span class="detail-val">' + moneyOrEm(c.actual_total_cents) + '</span></div>';
                        html += '<div class="detail-row"><span class="detail-key">Paid</span><span class="detail-val">' + moneyOrEm(c.actual_paid_cents) + '</span></div>';
                        html += '<div class="detail-row"><span class="detail-key">Payment</span><span class="detail-val">' + esc(paymentLabel(c.payment_status)) + '</span></div>';
                        html += '</div></div>';

                        // AI Summary
                        html += '<div class="info-panel">';
                        html += '<div class="info-panel-title ai">AI Summary</div>';
                        html += '<div class="info-panel-body">';
                        if (p.miso_briefing) html += md(p.miso_briefing);
                        else html += '<p class="empty-notes">No AI summary yet.</p>';
                        html += '</div></div>';

                        html += '</div>'; // close info-grid #1

                        // === Two-column grid #2: PREVIOUS HISTORY + HUMAN NOTES ===
                        html += '<div class="info-grid">';
                        // Previous History
                        html += '<div class="info-panel">';
                        html += '<div class="info-panel-title history">Previous History</div>';
                        html += '<div class="info-panel-body">';
                        var prev = p.previous_appointments || [];
                        if (prev.length === 0) html += '<p class="empty-notes">No previous sessions on file.</p>';
                        else prev.forEach(function(ph) {
                            html += '<div class="history-row">';
                            html += '<div class="history-date">' + esc(fmtPrevDate(ph.scheduled_at)) + '</div>';
                            if (ph.services_summary) html += '<div class="history-services">' + esc(ph.services_summary) + '</div>';
                            if (ph.session_notes_excerpt) html += '<div class="history-notes">' + esc(ph.session_notes_excerpt) + (ph.session_notes_excerpt.length >= 240 ? '\u2026' : '') + '</div>';
                            html += '</div>';
                        });
                        html += '</div></div>';

                        // Human Notes
                        html += '<div class="info-panel">';
                        html += '<div class="info-panel-title">Human Notes</div>';
                        html += '<div class="info-panel-body">';
                        if (p.miso_human_notes) html += md(p.miso_human_notes);
                        else html += '<p class="empty-notes">No frank-notes yet.</p>';
                        html += '</div></div>';

                        html += '</div>'; // close info-grid #2

                        html += '</div>'; // close pet-block
                    });

                    html += '</div>'; // end client-card
                });

                // Revenue total
                html += '<div class="revenue-total">';
                html += '<span class="revenue-label">Expected revenue today</span><br>';
                html += money(totalCents);
                html += '</div>';
            }
            html += '</div>';

            // Curated News
            if (news.length) {
                html += '<div class="glass"><div class="section-title"><span class="section-icon">&#127462;&#127482;</span> Curated News</div>';
                news.forEach(function(n) {
                    html += '<div class="news-item">';
                    if (n.label && n.emoji) html += '<span class="news-category ' + getCategoryClass(n.label) + '">' + esc(n.emoji) + ' ' + esc(n.label) + '</span>';
                    html += '<a href="' + escAttr(n.link) + '" target="_blank" rel="noopener">' + esc(n.title) + '</a>';
                    if (n.source) html += '<div class="news-source">' + esc(n.source) + '</div>';
                    html += '</div>';
                });
                html += '</div>';
            }

            // F1 News
            if (f1.length) {
                html += '<div class="glass"><div class="section-title"><span class="section-icon">&#127950;&#65039;</span> Formula 1</div>';
                f1.forEach(function(n) {
                    html += '<div class="news-item"><a href="' + escAttr(n.link) + '" target="_blank" rel="noopener">' + esc(n.title) + '</a>';
                    if (n.source) html += '<div class="news-source">' + esc(n.source) + '</div>';
                    html += '</div>';
                });
                html += '</div>';
            }

            // === FEEDBACK PANEL 1 ===
            html += '<div class="glass feedback-section"><div class="section-title"><span class="section-icon">&#128203;</span> How was today\'s briefing?</div>';
            html += '<div class="feedback-item"><label class="feedback-item-label">Was this useful today?</label>';
            html += '<div class="toggle-row">';
            html += '<button type="button" class="toggle-btn choose-useful" data-value="yes">Yes</button>';
            html += '<button type="button" class="toggle-btn choose-useful" data-value="somewhat">Somewhat</button>';
            html += '<button type="button" class="toggle-btn choose-useful" data-value="no">No</button>';
            html += '</div></div>';
            html += '<div class="feedback-item"><label class="feedback-item-label">Best section today?</label>';
            html += '<div class="tag-grid">';
            html += '<button type="button" class="tag-btn choose-section" data-value="Tip">Tip</button>';
            html += '<button type="button" class="tag-btn choose-section" data-value="News">News</button>';
            html += '<button type="button" class="tag-btn choose-section" data-value="F1">F1</button>';
            html += '<button type="button" class="tag-btn choose-section" data-value="Schedule">Schedule</button>';
            html += '<button type="button" class="tag-btn choose-section" data-value="Revenue">Revenue</button>';
            html += '</div></div>';
            html += '<div class="feedback-item"><label class="feedback-item-label">What would you change?</label>';
            html += '<textarea class="glass-input" id="fbChange" placeholder="Your suggestions..."></textarea></div>';
            html += '<div class="feedback-item"><label class="feedback-item-label">Anything to add or remove?</label>';
            html += '<textarea class="glass-input" id="fbAddRemove" placeholder="Content feedback..."></textarea></div>';
            html += '</div>';

            // === FEEDBACK PANEL 2 ===
            html += '<div class="glass feedback-section"><div class="section-title"><span class="section-icon">&#128394;</span> Design & experience</div>';
            html += '<div class="feedback-item"><label class="feedback-item-label">Reading experience?</label>';
            html += '<div class="toggle-row">';
            html += '<button type="button" class="toggle-btn choose-reading" data-value="easy">Easy</button>';
            html += '<button type="button" class="toggle-btn choose-reading" data-value="fine">Fine</button>';
            html += '<button type="button" class="toggle-btn choose-reading" data-value="hard">Hard to read</button>';
            html += '</div></div>';
            html += '<div class="feedback-item"><label class="feedback-item-label">Content amount?</label>';
            html += '<div class="toggle-row">';
            html += '<button type="button" class="toggle-btn choose-content" data-value="too_little">Too little</button>';
            html += '<button type="button" class="toggle-btn choose-content" data-value="just_right">Just right</button>';
            html += '<button type="button" class="toggle-btn choose-content" data-value="too_much">Too much</button>';
            html += '</div></div>';
            html += '<div class="feedback-item"><label class="feedback-item-label">How does it look?</label>';
            html += '<div class="toggle-row">';
            html += '<button type="button" class="toggle-btn choose-looks" data-value="love_it">Love it</button>';
            html += '<button type="button" class="toggle-btn choose-looks" data-value="its_fine">It\'s fine</button>';
            html += '<button type="button" class="toggle-btn choose-looks" data-value="needs_work">Needs work</button>';
            html += '</div></div>';
            html += '<div class="feedback-item"><label class="feedback-item-label">What would make this better?</label>';
            html += '<textarea class="glass-input" id="fbImprovement" placeholder="Design suggestions..."></textarea></div>';
            html += '<div class="feedback-item"><label class="feedback-item-label">General comments</label>';
            html += '<textarea class="glass-input" id="fbGeneral" placeholder="Any other thoughts..."></textarea></div>';
            html += '</div>';

            // Submit
            html += '<button class="submit-btn" id="submitBtn">Submit Feedback</button>';
            html += '<div class="feedback-msg" id="fbMsg"></div>';

            // Read More Links
            var allLinks = news.concat(f1).filter(function(n) { return n.link; });
            if (allLinks.length) {
                html += '<div class="glass" style="margin-top:20px;"><div class="section-title"><span class="section-icon">&#128279;</span> Read More</div><div class="links-grid">';
                allLinks.forEach(function(n) { html += '<div class="link-item"><a href="' + escAttr(n.link) + '" target="_blank" rel="noopener">' + esc(n.title) + '</a></div>'; });
                html += '</div></div>';
            }

            // Footer
            html += '<div class="footer"><p>Purrf Cat Grooming \u2022 Morning Briefing</p>';
            if (data.generatedAt) html += '<p style="margin-top:4px; font-size:0.72rem;">Generated ' + esc(data.generatedAt) + '</p>';
            html += '<p style="margin-top:4px;"><a href="/">groomentic.com.au</a></p></div>';

            document.getElementById('content').innerHTML = html;
            bindFeedback(briefingDate);
        }

        function bindFeedback(briefingDate) {
            document.querySelectorAll('.choose-useful').forEach(function(btn) {
                btn.addEventListener('click', function() {
                    feedbackState.useful = feedbackState.useful === btn.dataset.value ? '' : btn.dataset.value;
                    document.querySelectorAll('.choose-useful').forEach(function(b) { b.classList.toggle('active', b.dataset.value === feedbackState.useful); });
                });
            });
            document.querySelectorAll('.choose-section').forEach(function(btn) {
                btn.addEventListener('click', function() {
                    var v = btn.dataset.value;
                    var i = feedbackState.bestSections.indexOf(v);
                    if (i >= 0) feedbackState.bestSections.splice(i, 1); else feedbackState.bestSections.push(v);
                    document.querySelectorAll('.choose-section').forEach(function(b) { b.classList.toggle('active', feedbackState.bestSections.indexOf(b.dataset.value) >= 0); });
                });
            });
            var fbChange = document.getElementById('fbChange');
            if (fbChange) fbChange.addEventListener('input', function() { feedbackState.changeRequest = fbChange.value; });
            var fbAddRemove = document.getElementById('fbAddRemove');
            if (fbAddRemove) fbAddRemove.addEventListener('input', function() { feedbackState.addRemove = fbAddRemove.value; });
            document.querySelectorAll('.choose-reading').forEach(function(btn) {
                btn.addEventListener('click', function() {
                    feedbackState.readingExperience = feedbackState.readingExperience === btn.dataset.value ? '' : btn.dataset.value;
                    document.querySelectorAll('.choose-reading').forEach(function(b) { b.classList.toggle('active', b.dataset.value === feedbackState.readingExperience); });
                });
            });
            document.querySelectorAll('.choose-content').forEach(function(btn) {
                btn.addEventListener('click', function() {
                    feedbackState.contentAmount = feedbackState.contentAmount === btn.dataset.value ? '' : btn.dataset.value;
                    document.querySelectorAll('.choose-content').forEach(function(b) { b.classList.toggle('active', b.dataset.value === feedbackState.contentAmount); });
                });
            });
            document.querySelectorAll('.choose-looks').forEach(function(btn) {
                btn.addEventListener('click', function() {
                    feedbackState.looks = feedbackState.looks === btn.dataset.value ? '' : btn.dataset.value;
                    document.querySelectorAll('.choose-looks').forEach(function(b) { b.classList.toggle('active', b.dataset.value === feedbackState.looks); });
                });
            });
            var fbImprovement = document.getElementById('fbImprovement');
            if (fbImprovement) fbImprovement.addEventListener('input', function() { feedbackState.improvement = fbImprovement.value; });
            var fbGeneral = document.getElementById('fbGeneral');
            if (fbGeneral) fbGeneral.addEventListener('input', function() { feedbackState.generalComments = fbGeneral.value; });
            var submitBtn = document.getElementById('submitBtn');
            if (submitBtn) {
                submitBtn.addEventListener('click', function() {
                    var msg = document.getElementById('fbMsg');
                    var hasContent = feedbackState.useful || feedbackState.bestSections.length || (feedbackState.changeRequest && feedbackState.changeRequest.trim()) || (feedbackState.addRemove && feedbackState.addRemove.trim()) || feedbackState.readingExperience || feedbackState.contentAmount || feedbackState.looks || (feedbackState.improvement && feedbackState.improvement.trim()) || (feedbackState.generalComments && feedbackState.generalComments.trim());
                    if (!hasContent) { msg.className = 'feedback-msg error'; msg.textContent = 'Please provide at least one piece of feedback.'; return; }
                    submitBtn.disabled = true;
                    submitBtn.textContent = 'Submitting...';
                    fetch(API, { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({
                        action: 'feedback', user_name: USER, briefing_date: briefingDate, section: 'combined',
                        responses: {
                            useful: feedbackState.useful, best_sections: feedbackState.bestSections,
                            change_request: feedbackState.changeRequest, add_remove: feedbackState.addRemove,
                            reading_experience: feedbackState.readingExperience, content_amount: feedbackState.contentAmount,
                            looks: feedbackState.looks, improvement: feedbackState.improvement, general_comments: feedbackState.generalComments
                        }
                    })})
                    .then(function(res) { if (!res.ok) throw new Error('HTTP ' + res.status); msg.className = 'feedback-msg success'; msg.textContent = 'Thank you! Your feedback has been submitted.'; submitBtn.textContent = 'Submitted \u2713'; })
                    .catch(function(err) { console.error(err); msg.className = 'feedback-msg error'; msg.textContent = 'Failed to submit. Please try again.'; submitBtn.disabled = false; submitBtn.textContent = 'Submit Feedback'; });
                });
            }
        }

        init();
    })();
    </script>
</body>
</html>
